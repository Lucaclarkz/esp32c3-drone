name: Build Drone Firmware

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Configure ESP32 Core
        run: |
          arduino-cli config init
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Drone Libraries
        run: |
          arduino-cli lib install "ESP Async WebServer"
          arduino-cli lib install "AsyncTCP"
          arduino-cli lib install "MPU6050_light"

      - name: Compile Drone Firmware
        run: |
          # လက်ရှိ ရှိနေတဲ့ .ino ဖိုင်ကို နာမည်တူ Folder ဆောက်ပြီး ထည့်သွင်းခြင်း
          find . -maxdepth 1 -name "*.ino" -exec sh -c 'mkdir -p "${1%.*}" && cp "$1" "${1%.*}/" && arduino-cli compile --fqbn esp32:esp32:esp32c3 --output-dir build "${1%.*}/$1"' _ {} \;

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: drone-c3-firmware
          path: build/*.bin
          
